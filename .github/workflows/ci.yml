name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate app
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Start production server
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/coachcast.log 2>&1 &
          echo $! > /tmp/coachcast.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/api/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/coachcast.log
          exit 1

      - name: Smoke test production server
        run: npm run smoke

      - name: Stop production server
        if: always()
        run: |
          if [ -f /tmp/coachcast.pid ]; then
            kill "$(cat /tmp/coachcast.pid)" || true
          fi

      - name: Build container image
        run: docker build --tag coachcast:${{ github.sha }} .
